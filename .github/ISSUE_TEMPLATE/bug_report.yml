name: Bug report
description: Something is wrong with a diagnostic or the CLI itself
title: '[bug]: '
labels: [bug]
body:
  - type: markdown
    attributes:
      value: Thanks for reporting! Please do not paste secrets — use an anonymized report.
  - type: textarea
    id: what-happened
    attributes:
      label: What happened?
      description: What did you expect, and what did you get instead?
      placeholder: I ran `npx fix-my-setup --port 3000` and …
    validations:
      required: true
  - type: input
    id: command
    attributes:
      label: Command you ran
      placeholder: npx fix-my-setup --category Node.js --verbose
    validations:
      required: true
  - type: textarea
    id: report
    attributes:
      label: Anonymized report (optional but very helpful)
      description: Output of `npx fix-my-setup report`. It is scrubbed of usernames, paths, and secrets.
      render: json
  - type: input
    id: version
    attributes:
      label: fix-my-setup version
      placeholder: 0.1.0
    validations:
      required: true
  - type: dropdown
    id: os
    attributes:
      label: Operating system
      options:
        - Windows
        - macOS
        - Linux
    validations:
      required: true
  - type: input
    id: node
    attributes:
      label: Node.js version
      placeholder: 22.14.0
    validations:
      required: true
